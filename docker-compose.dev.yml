services:
  backend:
    container_name: pinnacle_backend
    build:
      context: ./Backend
    volumes:
      - ./Backend:/backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"

  frontend:
    container_name: pinnacle_frontend
    build:
      context: ./Frontend
    volumes:
      - ./Frontend:/frontend
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    depends_on:
      - backend
